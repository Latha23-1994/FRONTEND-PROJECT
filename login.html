<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JPR Facility Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="jpr.jpg" class="navbar-logo me-2" alt="JPR Logo" height="35" width="35">
                <span class="navbar-brand-text">JPR Facilities</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 py-5">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <a href="index.html" class="btn btn-outline-primary mb-3">
                                <i class="fas fa-home me-2"></i>Home
                            </a>
                            <img src="jpr.jpg" class="logo-img mx-auto d-block mb-3" alt="JPR Logo" height="60" width="60">
                            <h1 class="h3 fw-bold">Client Portal Login</h1>
                        </div>
                        <form id="loginForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control form-control-lg" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Access Dashboard</button>
                        </form>
                        <div class="text-center mt-4">
                            <p>New client? <a href="register.html" class="text-primary fw-bold">Register Account</a></p>
                            <hr>
                            <p class="text-muted small mb-0">Demo: test@example.com / password123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
